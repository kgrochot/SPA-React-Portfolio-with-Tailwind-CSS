<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Katarzyna – Portfolio SPA</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f4f4f4;
    }

    header {
      background: #1f2937;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    nav a {
      color: white;
      margin-left: 1.5rem;
      text-decoration: none;
      cursor: pointer;
    }

    nav a:hover {
      text-decoration: underline;
    }

    nav a.active {
      font-weight: bold;
      text-decoration: underline;
    }

    button {
      background: #1f2937;
      color: white;
      border: none;
      padding: 0.6rem 1rem;
      border-radius: 4px;
      cursor: pointer;
    }

    button:hover {
      opacity: 0.85;
    }

    .fade-in {
      animation: fade 0.3s ease-in-out;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(5px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    main {
      max-width: 900px;
      margin: 2rem auto;
      background: white;
      padding: 2rem;
      border-radius: 8px;
      min-height: 60vh;
    }

    .project-card {
      border: 1px solid #ddd;
      padding: 1rem;
      margin-bottom: 1rem;
      border-radius: 6px;
    }

    footer {
      background: #1f2937;
      color: white;
      text-align: center;
      padding: 1rem;
    }
  </style>
</head>

<body>

  <header>
    <h2>Katarzyna</h2>
    <nav>
      <a data-link href="/">Home</a>
      <a data-link href="/projects">Projekte</a>
      <a data-link href="/about">Über mich</a>
      <a data-link href="/contact">Kontakt</a>
    </nav>
  </header>

  <main id="app"></main>

  <footer>
    © 2026 Katarzyna – Webentwicklung & Prozesse
  </footer>

  <script>
    const app = document.getElementById("app");

    // -------- GLOBAL STATE --------
    const state = {
      projects: [
        {
          id: 1,
          title: "Unternehmenswebsite",
          description: "Responsive Umsetzung mit SEO-Optimierung und Performance-Fokus.",
          tech: ["HTML5", "CSS3", "JavaScript"]
        },
        {
          id: 2,
          title: "Online-Shop",
          description: "WooCommerce-Integration mit optimierter Nutzerführung.",
          tech: ["WordPress", "WooCommerce", "UX"]
        },
        {
          id: 3,
          title: "Portfolio SPA",
          description: "Clientseitiges Routing mit History API.",
          tech: ["JavaScript", "Routing", "SPA"]
        }
      ]
    };

    // -------- COMPONENTS --------

    const Layout = (content) => `
    <div class="fade-in">
      ${content}
    </div>
  `;

    const Home = () => Layout(`
    <h1>Willkommen</h1>
    <p>Ich entwickle strukturierte Webanwendungen mit Fokus auf UX, Performance und Prozesse.</p>
  `);

    const Projects = () => Layout(`
    <h1>Projekte</h1>
    ${state.projects.map(project => `
      <div class="project-card">
        <h3>${project.title}</h3>
        <p>${project.description}</p>
        <small>${project.tech.join(" • ")}</small>
      </div>
    `).join("")}
  `);

    const About = () => Layout(`
    <h1>Über mich</h1>
    <p>Erfahrung in Webdesign, Administration und Prozessoptimierung. 
    Schnittstelle zwischen Technik und Fachbereich.</p>
  `);

    const Contact = () => Layout(`
    <h1>Kontakt</h1>
    <form id="contact-form">
      <input type="text" placeholder="Name" required />
      <br><br>
      <input type="email" placeholder="E-Mail" required />
      <br><br>
      <textarea placeholder="Nachricht" required></textarea>
      <br><br>
      <button type="submit">Senden</button>
    </form>
  `);

    const NotFound = () => Layout(`
    <h1>404</h1>
    <p>Seite nicht gefunden.</p>
    <button onclick="navigateTo('/')">Zurück zur Startseite</button>
  `);

    // -------- ROUTES --------

    const routes = {
      "/": Home,
      "/projects": Projects,
      "/about": About,
      "/contact": Contact
    };

    function router() {
      const path = window.location.pathname;
      const component = routes[path] || NotFound;
      app.innerHTML = component();
      updateActiveNav();
    }

    function navigateTo(url) {
      history.pushState(null, null, url);
      router();
    }

    // -------- NAV ACTIVE STATE --------

    function updateActiveNav() {
      document.querySelectorAll("nav a").forEach(link => {
        link.classList.remove("active");
        if (link.getAttribute("href") === window.location.pathname) {
          link.classList.add("active");
        }
      });
    }

    // -------- EVENTS --------

    document.addEventListener("click", e => {
      if (e.target.matches("[data-link]")) {
        e.preventDefault();
        navigateTo(e.target.getAttribute("href"));
      }
    });

    window.addEventListener("popstate", router);

    document.addEventListener("submit", e => {
      if (e.target.id === "contact-form") {
        e.preventDefault();
        alert("Nachricht erfolgreich gesendet (Demo).");
      }
    });

    router();
  </script>

</body>

</html>
